<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Compañera Hellas</title>
  <style>
    :root {
      --void: #0a0a0f;
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.55);
      --gold-glow: rgba(201, 168, 76, 0.12);
      --panel: rgba(18, 18, 28, 0.85);
      --border: rgba(201, 168, 76, 0.28);
      --user-bubble: rgba(201, 168, 76, 0.08);
      --assistant-bubble: rgba(120, 100, 60, 0.12);
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--void);
      color: var(--gold);
      font-family: var(--font);
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(201, 168, 76, 0.07), transparent 50%),
        radial-gradient(ellipse 80% 50% at 100% 100%, rgba(80, 60, 30, 0.15), transparent 45%),
        linear-gradient(180deg, #050508 0%, var(--void) 35%, #06060a 100%);
      position: relative;
      overflow: hidden;
    }

    /* Estrellas sutiles */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.35), transparent),
        radial-gradient(1px 1px at 30% 65%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 72% 18%, rgba(255, 255, 255, 0.28), transparent),
        radial-gradient(1px 1px at 85% 55%, rgba(201, 168, 76, 0.25), transparent),
        radial-gradient(1px 1px at 45% 88%, rgba(255, 255, 255, 0.15), transparent),
        radial-gradient(1.5px 1.5px at 55% 40%, rgba(201, 168, 76, 0.2), transparent);
      background-size: 100% 100%;
      opacity: 0.85;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1rem 1.25rem;
    }

    header {
      flex-shrink: 0;
      padding: 1rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 24px var(--gold-glow);
    }

    header .subtitle {
      margin: 0.5rem 0 0;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }

    .candidato-row {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .candidato-row label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--gold-dim);
    }

    .candidato-row input {
      width: min(200px, 50vw);
      padding: 0.4rem 0.65rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--gold);
      font-size: 0.85rem;
    }

    .candidato-row input:focus {
      outline: none;
      border-color: rgba(201, 168, 76, 0.5);
      box-shadow: 0 0 0 2px var(--gold-glow);
    }

    .chat-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      margin-top: 1rem;
    }

    #chat {
      flex: 1;
      min-height: 200px;
      overflow-y: auto;
      padding: 0.75rem 0.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 6px;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(201, 168, 76, 0.25);
      border-radius: 3px;
    }

    .msg {
      max-width: 88%;
      padding: 0.75rem 1rem;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-color: rgba(201, 168, 76, 0.35);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.06);
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
      border-color: rgba(201, 168, 76, 0.22);
    }

    .msg .role {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.35rem;
    }

    .msg.error {
      align-self: stretch;
      border-color: rgba(180, 80, 80, 0.45);
      background: rgba(60, 30, 30, 0.25);
      color: #e8a0a0;
    }

    .typing {
      align-self: flex-start;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      color: var(--gold-dim);
      letter-spacing: 0.12em;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .composer {
      flex-shrink: 0;
      display: flex;
      gap: 0.65rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .composer textarea {
      flex: 1;
      min-height: 48px;
      max-height: 160px;
      resize: vertical;
      padding: 0.75rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--gold);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .composer textarea::placeholder {
      color: rgba(201, 168, 76, 0.35);
    }

    .composer textarea:focus {
      outline: none;
      border-color: rgba(201, 168, 76, 0.45);
      box-shadow: 0 0 0 2px var(--gold-glow);
    }

    .composer button {
      flex-shrink: 0;
      align-self: flex-end;
      padding: 0.75rem 1.35rem;
      background: linear-gradient(165deg, rgba(201, 168, 76, 0.22), rgba(201, 168, 76, 0.08));
      border: 1px solid rgba(201, 168, 76, 0.45);
      border-radius: 12px;
      color: var(--gold);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .composer button:hover:not(:disabled) {
      background: linear-gradient(165deg, rgba(201, 168, 76, 0.32), rgba(201, 168, 76, 0.12));
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.15);
    }

    .composer button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .empty-hint {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--gold-dim);
      font-size: 0.9rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>IA Compañera Hellas</h1>
      <p class="subtitle">Orbita de conversación</p>
      <div class="candidato-row">
        <label for="candidatoId">Candidato</label>
        <input id="candidatoId" type="text" value="default" autocomplete="off" spellcheck="false" />
      </div>
    </header>

    <div class="chat-wrap">
      <div id="chat" aria-live="polite" aria-relevant="additions"></div>

      <form class="composer" id="form" autocomplete="off">
        <textarea
          id="input"
          rows="2"
          placeholder="Escribe tu mensaje a Hellas…"
          aria-label="Mensaje"
        ></textarea>
        <button type="submit" id="send">Enviar</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var API =
        location.origin && location.origin !== "null"
          ? location.origin + "/chat"
          : "http://localhost:3000/chat";
      var chatEl = document.getElementById("chat");
      var form = document.getElementById("form");
      var input = document.getElementById("input");
      var sendBtn = document.getElementById("send");
      var candidatoInput = document.getElementById("candidatoId");

      /** @type {{ role: string, content: string }[]} */
      var messages = [];

      function scrollChat() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function renderWelcome() {
        if (messages.length > 0) return;
        chatEl.innerHTML =
          '<p class="empty-hint">Saluda a Hellas o plantea tu primera pregunta.<br/>Las respuestas llegan desde el servidor en <code style="color:#c9a84c">localhost:3000</code>.</p>';
      }

      function clearWelcome() {
        var hint = chatEl.querySelector(".empty-hint");
        if (hint) hint.remove();
      }

      function appendBubble(role, text, isError) {
        clearWelcome();
        var div = document.createElement("div");
        div.className = "msg " + (isError ? "error" : role);
        var label = document.createElement("span");
        label.className = "role";
        label.textContent = isError ? "Sistema" : role === "user" ? "Tú" : "Hellas";
        div.appendChild(label);
        div.appendChild(document.createTextNode(text));
        chatEl.appendChild(div);
        scrollChat();
      }

      function setTyping(show) {
        var old = chatEl.querySelector(".typing");
        if (old) old.remove();
        if (show) {
          var t = document.createElement("div");
          t.className = "typing";
          t.textContent = "Hellas está pensando…";
          chatEl.appendChild(t);
          scrollChat();
        }
      }

      function setBusy(busy) {
        sendBtn.disabled = busy;
        input.disabled = busy;
      }

      async function send() {
        var text = input.value.trim();
        if (!text) return;

        var candidatoId = (candidatoInput.value || "").trim() || "default";

        input.value = "";
        messages.push({ role: "user", content: text });
        appendBubble("user", text);

        var payload = {
          candidatoId: candidatoId,
          messages: messages.map(function (m) {
            return { role: m.role, content: m.content };
          }),
        };

        setBusy(true);
        setTyping(true);

        try {
          var res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          var data = await res.json().catch(function () {
            return {};
          });

          setTyping(false);

          if (!res.ok) {
            var errMsg =
              (data && data.error) ||
              ("Error HTTP " + res.status);
            if (data && data.details) errMsg += "\n" + data.details;
            appendBubble("assistant", errMsg, true);
            messages.pop();
            return;
          }

          var reply = (data && data.response) != null ? String(data.response) : "";
          messages.push({ role: "assistant", content: reply });
          appendBubble("assistant", reply || "(Sin texto en la respuesta.)");
        } catch (e) {
          setTyping(false);
          appendBubble(
            "assistant",
            "No se pudo conectar con el servidor. ¿Está activo en http://localhost:3000?\n" +
              (e && e.message ? e.message : ""),
            true
          );
          messages.pop();
        } finally {
          setBusy(false);
        }
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        send();
      });

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      renderWelcome();
    })();
  </script>
</body>
</html>
